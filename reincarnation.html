<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luân hồi</title>

    <link rel="stylesheet" href="reincarnation.css">

</head>

<body>

<main class="game">

    <h1 class="title">
        LUÂN HỒI
    </h1>

    <section class="rule">

        <div class="book">

            <p>
                Việc lựa chọn hình thái tái sinh yêu cầu
                tuân thủ Quy tắc Luân hồi.
            </p>

            <p class="hint">
                Nhấn để xem
            </p>

        </div>

    </section>

    <section class="reincarnation">

        <h2>HÌNH THÁI TÁI SINH</h2>

        <div class="options">

            <div class="option selected">

                <span class="arrow">></span>

                <span>Người</span>

            </div>

            <div class="option">

                <span class="arrow">></span>

                <span>Động vật</span>

            </div>

            <div class="option">

                <span class="arrow">></span>

                <span>Thực vật</span>

            </div>

            <div class="option">

                <span class="arrow">></span>

                <span>Đồ vật</span>

            </div>

        </div>

    </section>

</main>

<script src="reincarnation.js"></script>

</body>

</html>
