<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dương Gian</title>

    <link rel="stylesheet" href="living.css">

</head>

<body>

<main class="game">

    <h1 class="title">
        DƯƠNG GIAN
    </h1>

    <section class="section">

        <div class="document">

            <h2>KẾT LUẬN</h2>

            <p>
                Linh hồn này không thuộc phạm vi xét xử của Địa phủ.
            </p>

            <h2>NGUYÊN NHÂN</h2>

            <div class="reason selected">
                <span class="check">☑</span>
                <span>Tuổi thọ dương gian chưa kết thúc.</span>
            </div>

            <div class="reason">
                <span class="check">☐</span>
                <span>Người sống bị bắt nhầm.</span>
            </div>

            <div class="reason">
                <span class="check">☐</span>
                <span>Sai sót trong quá trình áp giải.</span>
            </div>

        </div>

        <div class="confirm-menu">

<div class="confirm-option" id="confirm">

    <span class="arrow"></span>
    XÁC NHẬN

</div>

<div class="confirm-option" id="back">

    <span class="arrow"></span>
    QUAY LẠI

</div>

<div id="notice" class="notice">

    <div class="notice-box">

        <div class="notice-line"></div>

        <div id="notice-text" class="notice-text"></div>

        <div class="notice-line"></div>

    </div>

        </div>

    </section>

</main>

<script src="living.js"></script>

</body>

</html>
